<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRCTC Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
  </div>

  <main class="login-wrapper">
    <form class="login-card" id="signupForm">
      <h1>Create Account</h1>

      <label for="signupEmail">Email</label>
      <input type="email" id="signupEmail" placeholder="Enter your email" required>

      <label for="signupPassword">Create Password</label>
      <input type="password" id="signupPassword" placeholder="Create a password" minlength="6" required>

      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Re-enter password" minlength="6" required>

      <button type="submit" class="login-btn">Sign Up</button>
      <p id="signupMessage" class="login-message"></p>
      <p class="auth-switch">
        Already have an account?
        <a href="login.html">Login</a>
      </p>
    </form>
  </main>

  <script>
    const signupForm = document.getElementById('signupForm');
    const signupMessage = document.getElementById('signupMessage');

    signupForm.addEventListener('submit', function (event) {
      event.preventDefault();

      const email = document.getElementById('signupEmail').value.trim().toLowerCase();
      const password = document.getElementById('signupPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        signupMessage.textContent = 'Passwords do not match.';
        signupMessage.className = 'login-message error';
        return;
      }

      const user = { email: email, password: password };
      localStorage.setItem('irctcUser', JSON.stringify(user));

      signupMessage.textContent = 'Account created. Redirecting to login...';
      signupMessage.className = 'login-message success';

      setTimeout(function () {
        window.location.href = 'login.html';
      }, 900);
    });
  </script>
</body>
</html>
