<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Train Search System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">TrainTicket™</div>
        <ul class="nav-links">
            <li><a href="#">Book Ticket</a></li>
            <li><a href="#">Check Schedule</a></li>
            <li><a href="#">Contact Us</a></li>
            <li><a href="#">Login</a></li>
            <li><a href="#">Register</a></li>
        </ul>
    </nav>

    <main class="hero-section">
        <div class="booking-container">
            <div class="booking-header">
                <h2>Book Ticket</h2>
            </div>
            
            <form class="booking-form" id="searchForm">
                <div class="form-group">
                    <label for="fromStation">From</label>
                    <input type="text" id="fromStation" placeholder="Enter From Station (e.g., HWH)" required>
                </div>
                
                <div class="form-group">
                    <label for="toStation">To</label>
                    <input type="text" id="toStation" placeholder="Enter To Station" required>
                </div>
                
                <div class="form-group">
                    <label for="journeyDate">Date</label>
                    <input type="date" id="journeyDate" required>
                </div>
                
                <button type="submit" class="search-btn">Search Trains</button>
            </form>
        </div>

        <div class="hero-text">
            <h1>Indian Railways</h1>
            <p>Safety | Security | Punctuality</p>
        </div>
    </main>
</body>
</html>
