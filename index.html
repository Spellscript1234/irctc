<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRCTC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
  </div>
  <div class="search-box">
    <p>From: <input type="text" placeholder="Enter from city name" id="from"></p>
    <p>To: <input type="text" placeholder="Enter to city name" id="to"></p>
    <p>Departure date: <input type="date" id="date"></p>
    <p><button id="sub">SUBMIT -></button></p>
  </div>
  <div class="sort-bar">
  <span>Sort by:</span>
  <button onclick="sortBy('price', 'asc')">Price ↑</button>
  <button onclick="sortBy('price', 'desc')">Price ↓</button>
  <button onclick="sortBy('duration', 'asc')">Duration ↑</button>
  <button onclick="sortBy('duration', 'desc')">Duration ↓</button>
</div>

<div class="results">
  <h4 id="searching"></h4>
</div>
  <div class="results">
    <h4 id="searching"></h4>
  </div>
  <script src="script.js"></script>
</body>
</html>
